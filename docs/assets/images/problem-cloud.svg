  <!-- Large -->
  <text x="135" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f87171" opacity="0.90">Bug Triage</text>
  <text x="430" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#fbbf24" opacity="0.88">Launch Readiness</text>
