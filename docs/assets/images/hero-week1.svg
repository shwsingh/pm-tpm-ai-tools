<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect width="1600" height="600" fill="url(#glow)"/>

  <g transform="translate(120, 200)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#60a5fa" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="0" cy="0" r="240" fill="none" stroke="#60a5fa" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <g transform="translate(1380, 480)">
    <circle cx="0" cy="0" r="60" fill="#fef3c7" fill-opacity="0.15"/>
    <circle cx="0" cy="0" r="40" fill="#fef3c7" fill-opacity="0.25"/>
  </g>

  <g transform="translate(1280, 120)">
    <circle cx="0" cy="0" r="80" fill="#dcfce7" fill-opacity="0.1"/>
  </g>
</svg>
