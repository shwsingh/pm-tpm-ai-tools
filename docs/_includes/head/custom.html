<!-- Mermaid diagram rendering -->
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.esm.min.mjs";
  mermaid.initialize({
    startOnLoad: false,
    theme: "default",
    securityLevel: "loose",
    flowchart: { curve: "basis", padding: 20 }
  });

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('pre > code.language-mermaid').forEach(el => {
      const wrapper = document.createElement('div');
      wrapper.className = 'mermaid';
      wrapper.textContent = el.textContent;
      el.parentElement.replaceWith(wrapper);
    });
    mermaid.run();
  });
</script>
<style>
  .mermaid { background: #ffffff; padding: 16px; border-radius: 8px; text-align: center; margin: 1.5em 0; border: 1px solid #e2e8f0; }
  .page__hero--overlay { min-height: 320px; }
  .notice--primary, .notice--info, .notice--success, .notice--warning, .notice--danger { border-radius: 8px; }
</style>
